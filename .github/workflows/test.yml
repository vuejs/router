name: test

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'packages/docs/**'
      - 'packages/playground/**'
      - 'packages/playground-file-based/**'
      - 'packages/experiments-playground/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'packages/docs/**'
      - 'packages/playground/**'
      - 'packages/playground-file-based/**'
      - 'packages/experiments-playground/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: pnpm

      - run: pnpm install
      - run: pnpm run lint
      - run: pnpm run -r build
      - run: pnpm run -r test:types
      - run: pnpm run -r test:unit

      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      # End-to-end tests (all browsers + HMR) run in the dedicated
      # "Playwright Tests" workflow (.github/workflows/playwright.yml).
