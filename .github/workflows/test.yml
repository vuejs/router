name: test

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'packages/docs/**'
      - 'packages/playground/**'
      - 'packages/playground-file-based/**'
      - 'packages/experiments-playground/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'packages/docs/**'
      - 'packages/playground/**'
      - 'packages/playground-file-based/**'
      - 'packages/experiments-playground/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: pnpm
      - run: pnpm install
      - run: pnpm run lint
      - run: pnpm run -r build
      - run: pnpm run -r test:types
      - run: pnpm run -r test:unit

      # e2e tests that run locally; Selenium Manager auto-resolves the drivers
      - run: pnpm run -r test:e2e:ci
      - run: pnpm run -r test:e2e:ci:firefox

      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
