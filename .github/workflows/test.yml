name: test

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'packages/docs/**'
      - 'packages/playground/**'
      - 'packages/playground-file-based/**'
      - 'packages/experiments-playground/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'packages/docs/**'
      - 'packages/playground/**'
      - 'packages/playground-file-based/**'
      - 'packages/experiments-playground/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run -r build
      - run: pnpm run -r test:types
      - run: pnpm run -r test:unit

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      # End-to-end tests (all browsers + HMR) run in the dedicated
      # "Playwright Tests" workflow (.github/workflows/playwright.yml).
