name: test

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'packages/docs/**'
      - 'packages/playground/**'
      - 'packages/playground-file-based/**'
      - 'packages/experiments-playground/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'packages/docs/**'
      - 'packages/playground/**'
      - 'packages/playground-file-based/**'
      - 'packages/experiments-playground/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run -r build
      - run: pnpm run -r test:types
      - run: pnpm run -r test:unit

      - uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      # End-to-end tests (all browsers + HMR) run in the dedicated
      # "Playwright Tests" workflow (.github/workflows/playwright.yml).
