name: Playwright Tests
on:
  push:
    branches: [main]
    paths-ignore:
      - 'packages/docs/**'
      - 'packages/playground/**'
      - 'packages/playground-file-based/**'
      - 'packages/experiments-playground/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'packages/docs/**'
      - 'packages/playground/**'
      - 'packages/playground-file-based/**'
      - 'packages/experiments-playground/**'

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build router
        run: pnpm run build
        working-directory: packages/router
      - name: Install Playwright Browsers
        # installs chromium, firefox and webkit (the full engine matrix)
        run: pnpm exec playwright install --with-deps
        working-directory: packages/router
      - name: Run Playwright tests
        # behavioural e2e specs across chromium/firefox/webkit + unplugin HMR
        run: pnpm exec playwright test
        working-directory: packages/router
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/router/playwright-report/
          retention-days: 30
