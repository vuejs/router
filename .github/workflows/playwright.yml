name: Playwright Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright@sha256:b0ab6f3cb99aa7803adbc14d9027ec1785fc6e433b97e134e0f8fe61683b6b53
      # --user 1001 runs non-root (matches the runner uid and keeps the Chromium
      # sandbox enabled); --ipc=host stops Chromium OOM-crashing on a small
      # container /dev/shm.
      options: --user 1001 --ipc=host
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build router
        run: pnpm run build
        working-directory: packages/router
      # Browsers + OS deps are baked into the mcr.microsoft.com/playwright
      # image, so no `playwright install` is needed (it would also fail under
      # the non-root --user 1001 since --with-deps needs root for apt).
      - name: Run Playwright tests
        run: pnpm exec playwright test
        working-directory: packages/router
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/router/playwright-report/
          retention-days: 30
