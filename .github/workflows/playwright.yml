name: Playwright Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright@sha256:b0ab6f3cb99aa7803adbc14d9027ec1785fc6e433b97e134e0f8fe61683b6b53
      # --user 1001 runs non-root (matches the runner uid and keeps the Chromium
      # sandbox enabled); --ipc=host stops Chromium OOM-crashing on a small
      # container /dev/shm.
      options: --user 1001 --ipc=host
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build router
        run: pnpm run build
        working-directory: packages/router
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
        working-directory: packages/router
      - name: Run Playwright tests
        run: pnpm exec playwright test
        working-directory: packages/router
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/router/playwright-report/
          retention-days: 30
