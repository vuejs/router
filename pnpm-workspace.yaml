packages:
  - 'packages/*'

shamefullyHoist: true

overrides:
  '@babel/generator': '^8.0.0-rc.4'
  '@babel/types': '^8.0.0-rc.4'
  '@types/node': '^24.10.4'
  '@vue/compiler-sfc': '^3.5.34'
  '@vue/runtime-dom': '^3.5.34'
  '@vue/server-renderer': '^3.5.34'
  'vite': '^7.3.0'
  'vue': '^3.5.34'

peerDependencyRules:
  ignoreMissing:
    - react
    - react-dom
    - '@types/react'

allowBuilds:
  chromedriver: true
  esbuild: true
  geckodriver: true
  simple-git-hooks: true
  '@nightwatch/nightwatch-inspector': false
